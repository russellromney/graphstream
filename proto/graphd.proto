syntax = "proto3";

package graphd;

// ─── Values (used by journal + snapshot on-disk format) ───

message NullValue {}

message GraphValue {
  oneof value {
    NullValue null_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double float_value = 4;
    string string_value = 5;
    ListValue list_value = 6;
    MapValue map_value = 7;
    bytes bytes_value = 8;
    TemporalValue temporal_value = 9;
    PointValue point_value = 10;
  }
}

message ListValue {
  repeated GraphValue values = 1;
}

message MapEntry {
  string key = 1;
  GraphValue value = 2;
}

message MapValue {
  repeated MapEntry entries = 1;
}

// ─── Temporal + spatial (faithful journaling of bolt temporal/point params) ───

enum TemporalKind {
  TEMPORAL_UNSPECIFIED = 0;
  DATE = 1;            // YYYY-MM-DD
  TIME = 2;            // HH:MM:SS[.fff]±HH:MM
  LOCAL_TIME = 3;      // HH:MM:SS[.fff]
  DATETIME = 4;        // YYYY-MM-DDTHH:MM:SS[.fff]±HH:MM
  LOCAL_DATETIME = 5;  // YYYY-MM-DDTHH:MM:SS[.fff]
  DURATION = 6;        // ISO 8601 duration (P1Y2M3DT4H5M6S)
}

message TemporalValue {
  TemporalKind kind = 1;
  string iso = 2;
}

message PointValue {
  uint32 srid = 1;
  double x = 2;
  double y = 3;
  // 2D point if z is absent, 3D point otherwise.
  optional double z = 4;
}

// ─── Journal ───

message JournalEntry {
  uint64 sequence = 1;
  string query = 2;
  repeated MapEntry params = 3;
  int64 timestamp_ms = 4;
}

message SnapshotMeta {
  uint64 sequence = 1;
  bytes chain_hash = 2;
  int64 timestamp_ms = 3;
  string version = 4;
}
